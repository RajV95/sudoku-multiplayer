apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sudoku-ingress
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sudoku-app-service
                port:
                  number: 80
